<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Customer Churn Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        h1   { color: #333; }
        label{ display: block; margin-top: 12px; font-weight: bold; }
        input, select { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 10px 24px; background: #4a90d9; color: #fff; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; }
        #result { margin-top: 24px; padding: 16px; background: #f0f4ff; border-radius: 6px; display: none; }
    </style>
</head>
<body>
    <h1>🔮 Customer Churn Predictor</h1>
    <form id="predictForm">
        <label>Gender
            <select name="gender"><option>Female</option><option>Male</option></select>
        </label>
        <label>Senior Citizen (0/1)
            <input type="number" name="SeniorCitizen" value="0" min="0" max="1"/>
        </label>
        <label>Partner <select name="Partner"><option>Yes</option><option>No</option></select></label>
        <label>Dependents <select name="Dependents"><option>No</option><option>Yes</option></select></label>
        <label>Tenure (months) <input type="number" name="tenure" value="12"/></label>
        <label>Phone Service <select name="PhoneService"><option>Yes</option><option>No</option></select></label>
        <label>Multiple Lines <select name="MultipleLines"><option>No</option><option>Yes</option><option>No phone service</option></select></label>
        <label>Internet Service <select name="InternetService"><option>DSL</option><option>Fiber optic</option><option>No</option></select></label>
        <label>Online Security <select name="OnlineSecurity"><option>No</option><option>Yes</option><option>No internet service</option></select></label>
        <label>Online Backup <select name="OnlineBackup"><option>No</option><option>Yes</option><option>No internet service</option></select></label>
        <label>Device Protection <select name="DeviceProtection"><option>No</option><option>Yes</option><option>No internet service</option></select></label>
        <label>Tech Support <select name="TechSupport"><option>No</option><option>Yes</option><option>No internet service</option></select></label>
        <label>Streaming TV <select name="StreamingTV"><option>No</option><option>Yes</option><option>No internet service</option></select></label>
        <label>Streaming Movies <select name="StreamingMovies"><option>No</option><option>Yes</option><option>No internet service</option></select></label>
        <label>Contract <select name="Contract"><option>Month-to-month</option><option>One year</option><option>Two year</option></select></label>
        <label>Paperless Billing <select name="PaperlessBilling"><option>Yes</option><option>No</option></select></label>
        <label>Payment Method
            <select name="PaymentMethod">
                <option>Electronic check</option>
                <option>Mailed check</option>
                <option>Bank transfer (automatic)</option>
                <option>Credit card (automatic)</option>
            </select>
        </label>
        <label>Monthly Charges <input type="number" step="0.01" name="MonthlyCharges" value="50.00"/></label>
        <label>Total Charges <input type="number" step="0.01" name="TotalCharges" value="600.00"/></label>
        <button type="submit">Predict Churn</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById("predictForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const body = Object.fromEntries(fd.entries());
            const res = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            const div = document.getElementById("result");
            div.style.display = "block";
            if (data.error) {
                div.innerHTML = `<b style="color:red">Error:</b> ${data.error}`;
            } else {
                div.innerHTML = `
                    <h3>Prediction: <span style="color:${data.churn==='Yes'?'crimson':'green'}">${data.churn}</span></h3>
                    <p>Churn Probability: <b>${data.churn_probability}</b></p>
                `;
            }
        });
    </script>
</body>
</html>
